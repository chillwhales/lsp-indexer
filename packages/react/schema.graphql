# Local schema for codegen fallback.
# This is a minimal valid GraphQL schema used when Hasura introspection is not available.
# When Hasura is available, codegen introspects the live endpoint instead.
#
# NOTE: This is NOT the full Hasura schema — it provides enough structure for
# codegen to generate TypedDocumentString and base types. Full Hasura types
# (filters, aggregates, ordering) come from introspection.

scalar DateTime
scalar BigInt
scalar numeric

type Query {
  """
  Placeholder query for codegen — real queries come from Hasura introspection
  """
  __placeholder: Boolean
}
