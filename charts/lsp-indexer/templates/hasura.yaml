apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lsp-indexer.fullname" . }}-hasura
  labels:
    {{- include "lsp-indexer.labels" . | nindent 4 }}
    app.kubernetes.io/component: hasura
spec:
  replicas: {{ .Values.hasura.replicaCount }}
  selector:
    matchLabels:
      {{- include "lsp-indexer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: hasura
  template:
    metadata:
      labels:
        {{- include "lsp-indexer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: hasura
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: hasura
          image: "{{ .Values.hasura.image.repository }}:{{ .Values.hasura.image.tag }}"
          imagePullPolicy: {{ .Values.hasura.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              {{- include "lsp-indexer.databaseUrlScript" . | nindent 14 }}
              export PG_DATABASE_URL="${database_url}"
              export HASURA_GRAPHQL_DATABASE_URL="${database_url}"
              export HASURA_GRAPHQL_METADATA_DATABASE_URL="${database_url}"
              exec graphql-engine serve
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "lsp-indexer.postgresPasswordSecretName" . }}
                  key: {{ .Values.postgres.passwordSecret.key }}
            - name: HASURA_GRAPHQL_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.keys.hasuraAdminSecret }}
            - name: HASURA_GRAPHQL_METADATA_DEFAULTS
              value: {{ include "lsp-indexer.hasuraMetadataDefaults" . | quote }}
            {{- range $name, $value := .Values.hasura.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
          resources:
            {{- toYaml .Values.hasura.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lsp-indexer.fullname" . }}-hasura
  labels:
    {{- include "lsp-indexer.labels" . | nindent 4 }}
    app.kubernetes.io/component: hasura
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.hasura.service.port }}
      targetPort: http
  selector:
    {{- include "lsp-indexer.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: hasura
