apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lsp-indexer.fullname" . }}-docs
  labels:
    {{- include "lsp-indexer.labels" . | nindent 4 }}
    app.kubernetes.io/component: docs
spec:
  replicas: {{ .Values.docs.replicaCount }}
  selector:
    matchLabels:
      {{- include "lsp-indexer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: docs
  template:
    metadata:
      labels:
        {{- include "lsp-indexer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: docs
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: docs
          image: "{{ .Values.docs.image.repository }}:{{ .Values.docs.image.tag }}"
          imagePullPolicy: {{ .Values.docs.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.docs.service.port }}
            - name: ws
              containerPort: {{ .Values.docs.service.wsPort }}
          env:
            {{- range $name, $value := .Values.docs.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
          resources:
            {{- toYaml .Values.docs.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lsp-indexer.fullname" . }}-docs
  labels:
    {{- include "lsp-indexer.labels" . | nindent 4 }}
    app.kubernetes.io/component: docs
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.docs.service.port }}
      targetPort: http
    - name: ws
      port: {{ .Values.docs.service.wsPort }}
      targetPort: ws
  selector:
    {{- include "lsp-indexer.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: docs
