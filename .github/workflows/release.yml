name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    uses: kethalia/workflows/.github/workflows/release-changesets.yml@v4
    with:
      publish-command: pnpm ci:publish
      setup-command: pnpm build
      pr-title: "chore: version packages"
      commit-message: "chore: version packages"
    secrets: inherit

  prepare-image-promotion:
    name: Prepare image promotion
    needs: [release]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      source-tag: ${{ steps.plan.outputs.source-tag }}
      version: ${{ steps.plan.outputs.version }}
    steps:
      - name: Build retag plan
        id: plan
        env:
          PUBLISHED_PACKAGES: ${{ needs.release.outputs['published-packages'] }}
        run: |
          set -euo pipefail
          version="$(jq -r '
            [
              .[]
              | select(.name == "@chillwhales/indexer" or (.name | startswith("@lsp-indexer/")))
              | .version
            ][0] // ""
          ' <<<"${PUBLISHED_PACKAGES}")"
          if [ -z "${version}" ]; then
            echo "No indexer package version found in publishedPackages; skipping image promotion."
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo "source-tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          source_tag="sha-${GITHUB_SHA::7}"
          matrix="$(jq -nc --arg version "${version}" '{
            include: [
              { image: "lsp-indexer", version: $version },
              { image: "lsp-indexer-docs", version: $version }
            ]
          }')"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "source-tag=${source_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Wait for source images
        if: steps.plan.outputs.matrix != '{"include":[]}'
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_TAG: ${{ steps.plan.outputs.source-tag }}
        run: |
          set -euo pipefail
          echo "${GH_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          for image in lsp-indexer lsp-indexer-docs; do
            ref="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${image}:${SOURCE_TAG}"
            echo "Waiting for ${ref}"
            for attempt in $(seq 1 60); do
              if docker manifest inspect "${ref}" >/dev/null 2>&1; then
                echo "Found ${ref}"
                break
              fi
              if [ "${attempt}" = "60" ]; then
                echo "::error::Timed out waiting for ${ref}"
                exit 1
              fi
              sleep 20
            done
          done

  promote-images:
    name: Promote ${{ matrix.image }}
    needs: [prepare-image-promotion]
    if: needs.prepare-image-promotion.outputs.matrix != '{"include":[]}'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-image-promotion.outputs.matrix) }}
    uses: kethalia/workflows/.github/workflows/retag-image.yml@v4
    with:
      image: ${{ matrix.image }}
      source-tag: ${{ needs.prepare-image-promotion.outputs.source-tag }}
      dest-tags: |
        v${{ matrix.version }}
        latest
    secrets: inherit
