name: CI

on:
  push:
    branches: [main, refactor/indexer-v2-react]
  pull_request:
    branches: [main, refactor/indexer-v2-react]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Formatting — fast, runs first
  # ---------------------------------------------------------------------------
  format:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  # ---------------------------------------------------------------------------
  # Lint — ESLint with strict TypeScript rules
  # ---------------------------------------------------------------------------
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Full build of dependency packages so lib/ type declarations are
      # available for ESLint's type-checked rules (codegen alone only
      # produces src/ — the package entry points reference lib/).
      - name: Build dependency packages
        run: |
          pnpm --filter=@chillwhales/abi build
          pnpm --filter=@chillwhales/typeorm build

      - run: pnpm lint

  # ---------------------------------------------------------------------------
  # Build — active packages across Node versions
  # ---------------------------------------------------------------------------
  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm --filter='!test' build
