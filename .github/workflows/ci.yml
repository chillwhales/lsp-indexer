name: CI

on:
  push:
    branches: [main, refactor/indexer-v2-react]
  pull_request:
    branches: [main, refactor/indexer-v2-react]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build, lint, test pipeline (shared from kethalia/workflows)
  # ---------------------------------------------------------------------------
  build-test:
    uses: kethalia/workflows/.github/workflows/ci-build-lint-test.yml@v3.2.0
    with:
      node-version: 22
      build-command: pnpm build
      lint-command: pnpm lint
      format-command: pnpm format:check
      typecheck-command: pnpm typecheck
      test-command: pnpm test:coverage
      pre-lint-command: 'pnpm --filter=@chillwhales/indexer build'
      test-node-versions: '[20, 22]'
      artifact-paths: |
        packages/types/dist
        packages/node/dist
        packages/react/dist
        packages/next/dist
        packages/indexer/lib

  # ---------------------------------------------------------------------------
  # Quality checks (shared from kethalia/workflows)
  # ---------------------------------------------------------------------------
  quality:
    needs: [build-test]
    uses: kethalia/workflows/.github/workflows/ci-quality.yml@v3.2.0
    with:
      verify-command: pnpm validate:publish
      changeset-check: ${{ github.base_ref == 'main' }}
      base-branch: main
      audit: false

  # ---------------------------------------------------------------------------
  # Helm chart check
  # ---------------------------------------------------------------------------
  helm:
    uses: kethalia/workflows/.github/workflows/helm-lint.yml@v3.2.0
    with:
      charts: charts/lsp-indexer
      validate-templates: false

  # ---------------------------------------------------------------------------
  # Docs sidecar check
  # ---------------------------------------------------------------------------
  docs-check:
    uses: kethalia/workflows/.github/workflows/ci-build-lint-test.yml@v3.2.0
    with:
      node-version: 22
      build-command: pnpm --filter docs generate:check
      test-node-versions: '[]'
      artifact-paths: package.json

  # ---------------------------------------------------------------------------
  # Gate — single required check for branch protection
  # ---------------------------------------------------------------------------
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [build-test, quality, helm, docs-check]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build-test.result }}" != "success" ]]; then
            echo "build-test failed"
            exit 1
          fi
          if [[ "${{ needs.quality.result }}" != "success" ]]; then
            echo "quality failed"
            exit 1
          fi
          if [[ "${{ needs.helm.result }}" != "success" ]]; then
            echo "helm failed"
            exit 1
          fi
          if [[ "${{ needs.docs-check.result }}" != "success" ]]; then
            echo "docs-check failed"
            exit 1
          fi
          echo "All checks passed"
