name: CI

on:
  push:
    branches: [main, refactor/indexer-v2-react]
  pull_request:
    branches: [main, refactor/indexer-v2-react]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build, lint, test pipeline (shared from kethalia/workflows)
  # ---------------------------------------------------------------------------
  build-test:
    uses: kethalia/workflows/.github/workflows/ci-build-lint-test.yml@v4
    with:
      node-version: 22
      build-command: pnpm build
      lint-command: pnpm lint
      format-command: pnpm format:check && pnpm --filter docs generate:check
      typecheck-command: pnpm typecheck
      test-command: pnpm test:coverage
      pre-lint-command: 'pnpm --filter=@chillwhales/indexer build'
      test-node-versions: '[20, 22]'
      artifact-paths: |
        packages/types/dist
        packages/node/dist
        packages/react/dist
        packages/next/dist
        packages/indexer/lib

  # ---------------------------------------------------------------------------
  # Quality checks (shared from kethalia/workflows)
  # ---------------------------------------------------------------------------
  quality:
    needs: [build-test]
    uses: kethalia/workflows/.github/workflows/ci-quality.yml@v4
    with:
      verify-command: pnpm validate:publish
      changeset-check: ${{ github.base_ref == 'main' }}
      base-branch: main
      audit: false

  # ---------------------------------------------------------------------------
  # Helm chart check
  # ---------------------------------------------------------------------------
  helm:
    uses: kethalia/workflows/.github/workflows/helm-lint.yml@v4
    with:
      charts: charts/lsp-indexer
      validate-templates: false
