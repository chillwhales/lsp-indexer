name: CI

on:
  push:
    branches: [main, refactor/indexer-v2-react]
  pull_request:
    branches: [main, refactor/indexer-v2-react]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build, lint, test pipeline (shared from chillwhales/.github)
  # ---------------------------------------------------------------------------
  build-test:
    uses: chillwhales/.github/.github/workflows/ci-build-lint-test.yml@main
    with:
      node-version: 22
      build-command: pnpm build
      lint-command: pnpm lint
      format-command: pnpm format:check
      typecheck-command: pnpm typecheck
      test-command: pnpm test:coverage
      pre-lint-command: 'pnpm --filter=@chillwhales/abi build && pnpm --filter=@chillwhales/typeorm build'
      test-node-versions: '[20, 22]'
      artifact-paths: |
        packages/types/dist
        packages/node/dist
        packages/react/dist
        packages/next/dist
        packages/abi/lib
        packages/typeorm/lib

  # ---------------------------------------------------------------------------
  # Quality checks (shared from chillwhales/.github)
  # ---------------------------------------------------------------------------
  quality:
    needs: [build-test]
    uses: chillwhales/.github/.github/workflows/ci-quality.yml@main
    with:
      verify-command: pnpm validate:publish
      changeset-check: ${{ github.base_ref == 'main' }}
      base-branch: main

  # ---------------------------------------------------------------------------
  # Docs sidecar check — ensures .md sidecars are committed and up to date
  # ---------------------------------------------------------------------------
  docs-check:
    name: Docs Sidecar Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check .md sidecars are up to date
        # Developers must run `pnpm --filter docs generate` and commit updated .md
        # files whenever they modify a src/app/docs/*/page.mdx source file.
        run: pnpm --filter docs generate:check

  # ---------------------------------------------------------------------------
  # Gate — single required check for branch protection
  # ---------------------------------------------------------------------------
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [build-test, quality, docs-check]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build-test.result }}" != "success" ]]; then
            echo "build-test failed"
            exit 1
          fi
          if [[ "${{ needs.quality.result }}" != "success" ]]; then
            echo "quality failed"
            exit 1
          fi
          if [[ "${{ needs.docs-check.result }}" != "success" ]]; then
            echo "docs-check failed"
            exit 1
          fi
          echo "All checks passed"
