name: Docker

on:
  push:
    tags: ['indexer-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.0.0) — omit to use git SHA'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          IMAGE="ghcr.io/chillwhales/lsp-indexer"

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Tag push: indexer-v1.2.3 → 1.2.3
            VERSION="${GITHUB_REF_NAME#indexer-v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            # Manual dispatch with version
            VERSION="${{ inputs.version }}"
          else
            # Manual dispatch without version — SHA only
            VERSION=""
          fi

          TAGS="${IMAGE}:${SHA}"
          if [[ -n "$VERSION" ]]; then
            TAGS="${TAGS},${IMAGE}:v${VERSION},${IMAGE}:latest"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "version=${VERSION:-${SHA}}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/chillwhales/lsp-indexer
            org.opencontainers.image.description=LUKSO blockchain indexer
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            org.opencontainers.image.licenses=MIT
