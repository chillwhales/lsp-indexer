# ==============================================================================
# Loki Configuration — Single Instance
# ==============================================================================
#
# Stores logs from all Docker containers collected by Grafana Alloy.
# Filesystem backend with TSDB index — suitable for single-node deployments.
#
# ==============================================================================

auth_enabled: false

server:
  http_listen_port: 3100

common:
  ring:
    kvstore:
      store: inmemory
    replication_factor: 1
    instance_addr: 127.0.0.1

schema_config:
  configs:
    - from: '2020-10-24'
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks

ingester:
  wal:
    dir: /loki/wal
    replay_memory_ceiling: 150MB
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1

limits_config:
  # 14 days — edit to change log retention
  retention_period: 336h

  # Query guardrails — prevent individual queries from OOM-killing Loki.
  # The Grafana dashboard fires 20+ concurrent LogQL queries every 30s;
  # without limits a single heavy query (max_over_time + unwrap + json) can
  # allocate hundreds of MB.
  max_query_series: 5000
  max_entries_limit_per_query: 10000
  max_query_parallelism: 16

query_scheduler:
  max_outstanding_requests_per_tenant: 256

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
