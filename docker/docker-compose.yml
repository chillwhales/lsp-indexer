# ==============================================================================
# Docker Compose for indexer — Fully Unattended Operation
# ==============================================================================
#
# Features:
# - Multi-stage build with layer caching for fast rebuilds
# - PostgreSQL with persistent volume
# - Hasura GraphQL API (automatically configured on startup)
# - Grafana monitoring (dashboards, logs, metrics)
# - Comprehensive logging (both file and stdout)
# - Health checks for all services
# - Auto-restart policies
# - Proper service dependencies and startup ordering
#
# Usage:
#   cd docker
#   docker compose --env-file ../.env up -d
#   docker compose --env-file ../.env logs -f indexer
#   docker compose --env-file ../.env down
#
# Environment:
#   Copy ../.env.example to ../.env and configure before running
#   The .env file MUST be in the repository root (../.env)
#
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # PostgreSQL Database
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: lsp-indexer-postgres
    restart: unless-stopped

    # Health check to ensure DB is ready before starting indexer
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

    # Persistent volume for database data
    volumes:
      - postgres-data:/var/lib/postgresql/data

    # PostgreSQL tuning for high-write workload (blockchain indexing)
    command:
      - postgres
      - -c
      - max_wal_size=2GB
      - -c
      - shared_buffers=512MB
      - -c
      - checkpoint_timeout=15min
      - -c
      - work_mem=64MB
      - -c
      - log_min_duration_statement=500

    # Database credentials from .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}

    # Expose port for external tools (optional)
    ports:
      - '${POSTGRES_PORT:-5432}:5432'

    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ----------------------------------------------------------------------------
  # Indexer — LUKSO Blockchain Indexer
  # ----------------------------------------------------------------------------
  indexer:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
      # Cache build stages for faster rebuilds
      cache_from:
        - lsp-indexer:latest

    image: lsp-indexer:latest
    container_name: lsp-indexer
    restart: unless-stopped

    # Wait for PostgreSQL to be healthy before starting
    # Note: Hasura/data-connector start in parallel but indexer doesn't wait
    # (entrypoint script waits for Hasura to be ready before configuring)
    depends_on:
      postgres:
        condition: service_healthy

    # Health check - verify indexer process is running
    healthcheck:
      test: ['CMD', 'pgrep', '-f', 'ts-node.*lib/app/index.js']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Mount logs directory for persistent storage
    volumes:
      - indexer-logs:/app/packages/indexer/logs

    # All environment variables from .env
    environment:
      # Database connection
      DB_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}

      # Blockchain data sources
      SQD_GATEWAY: ${SQD_GATEWAY:-https://v2.archive.subsquid.io/network/lukso-mainnet}
      RPC_URL: ${RPC_URL:-https://rpc.lukso.sigmacore.io}
      RPC_RATE_LIMIT: ${RPC_RATE_LIMIT:-10}
      FINALITY_CONFIRMATION: ${FINALITY_CONFIRMATION:-75}

      # IPFS & Metadata
      IPFS_GATEWAY: ${IPFS_GATEWAY:-https://api.universalprofile.cloud/ipfs/}
      FETCH_LIMIT: ${FETCH_LIMIT:-10000}
      FETCH_BATCH_SIZE: ${FETCH_BATCH_SIZE:-1000}
      FETCH_RETRY_COUNT: ${FETCH_RETRY_COUNT:-5}
      METADATA_WORKER_POOL_SIZE: ${METADATA_WORKER_POOL_SIZE:-4}

      # Logging
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /app/packages/indexer/logs
      INDEXER_ENABLE_FILE_LOGGER: ${INDEXER_ENABLE_FILE_LOGGER:-true}

      # Hasura configuration (for entrypoint script)
      HASURA_GRAPHQL_ENDPOINT: ${HASURA_GRAPHQL_ENDPOINT:-http://hasura:8080}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:?HASURA_GRAPHQL_ADMIN_SECRET must be set in .env}

    # Logging configuration for Docker
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '10'
        compress: 'true'

    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  # ----------------------------------------------------------------------------
  # Hasura GraphQL Engine
  # Automatically configured on startup with all tables and relationships
  # ----------------------------------------------------------------------------
  hasura:
    image: hasura/graphql-engine:v2.46.0
    container_name: lsp-indexer-hasura
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      data-connector-agent:
        condition: service_healthy

    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/healthz']
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 5s

    ports:
      - '${HASURA_GRAPHQL_PORT:-8080}:8080'

    environment:
      PG_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      HASURA_GRAPHQL_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      HASURA_GRAPHQL_METADATA_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:?HASURA_GRAPHQL_ADMIN_SECRET must be set in .env}
      HASURA_GRAPHQL_ENABLE_CONSOLE: ${HASURA_GRAPHQL_ENABLE_CONSOLE:-true}
      HASURA_GRAPHQL_DEV_MODE: ${HASURA_GRAPHQL_DEV_MODE:-true}
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: ${HASURA_GRAPHQL_ENABLED_LOG_TYPES:-startup,http-log,webhook-log,websocket-log,query-log}
      HASURA_GRAPHQL_METADATA_DEFAULTS: ${HASURA_GRAPHQL_METADATA_DEFAULTS:-{"backend_configs":{"dataconnector":{"athena":{"uri":"http://data-connector-agent:8081/api/v1/athena"},"mariadb":{"uri":"http://data-connector-agent:8081/api/v1/mariadb"},"mysql8":{"uri":"http://data-connector-agent:8081/api/v1/mysql"},"oracle":{"uri":"http://data-connector-agent:8081/api/v1/oracle"},"snowflake":{"uri":"http://data-connector-agent:8081/api/v1/snowflake"}}}}}
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: ${HASURA_GRAPHQL_UNAUTHORIZED_ROLE:-public}

    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ----------------------------------------------------------------------------
  # Hasura Data Connector Agent
  # Required dependency for Hasura GraphQL Engine
  # ----------------------------------------------------------------------------
  data-connector-agent:
    image: hasura/graphql-data-connector:v2.46.0
    container_name: lsp-indexer-data-connector
    restart: unless-stopped

    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8081/api/v1/athena/health']
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 5s

    environment:
      QUARKUS_LOG_LEVEL: ERROR
      QUARKUS_OPENTELEMETRY_ENABLED: 'false'

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ----------------------------------------------------------------------------
  # Loki — Log Aggregation
  # Receives logs from Alloy and stores them on local filesystem
  # ----------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.4
    container_name: lsp-indexer-loki
    restart: unless-stopped

    command: -config.file=/etc/loki/config.yaml

    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --quiet --tries=1 --output-document=- http://localhost:3100/ready || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    volumes:
      - loki-data:/loki
      - ./loki/config.yaml:/etc/loki/config.yaml:ro

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ----------------------------------------------------------------------------
  # Prometheus — Metrics Storage
  # Receives metrics from Alloy via remote write
  # ----------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.2.0
    container_name: lsp-indexer-prometheus
    restart: unless-stopped

    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --storage.tsdb.retention.time=14d

    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --quiet --tries=1 --output-document=- http://localhost:9090/-/healthy || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ----------------------------------------------------------------------------
  # Grafana Alloy — Unified Log & Metric Collector
  # Collects Docker logs → Loki, scrapes cAdvisor metrics → Prometheus
  # ----------------------------------------------------------------------------
  alloy:
    image: grafana/alloy:v1.8
    container_name: lsp-indexer-alloy
    restart: unless-stopped

    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy

    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy

    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --quiet --tries=1 --output-document=- http://localhost:12345/-/healthy || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ----------------------------------------------------------------------------
  # cAdvisor — Container Resource Metrics
  # Provides per-container CPU, memory, network, and disk I/O metrics
  # ----------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    container_name: lsp-indexer-cadvisor
    restart: unless-stopped
    privileged: true

    command: --housekeeping_interval=30s --docker_only=true

    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --quiet --tries=1 --output-document=- http://localhost:8080/healthz || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ----------------------------------------------------------------------------
  # Grafana — Dashboard & Visualization
  # Pre-provisioned with Loki and Prometheus datasources + dashboard JSON files
  # ----------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    container_name: lsp-indexer-grafana
    restart: unless-stopped

    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy

    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --quiet --tries=1 --output-document=- http://localhost:3000/api/health || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    ports:
      - '${GRAFANA_PORT:-3000}:3000'

    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro

    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

# ==============================================================================
# Persistent Volumes
# ==============================================================================
volumes:
  # PostgreSQL data — persists across container restarts
  postgres-data:
    driver: local
    # Optional: use a specific host path instead of Docker volume
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: ${POSTGRES_VOLUME_PATH:-./data/postgres}

  # Indexer logs — accessible from host for analysis
  indexer-logs:
    driver: local
    # Optional: use a specific host path for easier access
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: ${LOG_DIR:-./logs}

  # Grafana dashboard data — operator edits persist across restarts
  grafana-data:
    driver: local

  # Loki log data — stores collected container logs
  loki-data:
    driver: local

  # Prometheus metric data — stores scraped time-series metrics
  prometheus-data:
    driver: local
# ==============================================================================
# Networks (optional)
# ==============================================================================
# Uncomment to create a custom network for service isolation
# networks:
#   lsp-indexer-net:
#     driver: bridge
