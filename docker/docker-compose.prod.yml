# ==============================================================================
# Docker Compose for indexer — Production Deployment
# ==============================================================================
#
# Uses the pre-built Docker image from GitHub Container Registry.
# No source code required — just configure environment variables and run.
#
# Features:
# - Pre-built image from ghcr.io (no local build needed)
# - PostgreSQL with persistent volume (port NOT exposed)
# - Hasura GraphQL API (console and dev mode disabled by default)
# - Comprehensive logging (both file and stdout)
# - Health checks for all services
# - Auto-restart policies
# - Proper service dependencies and startup ordering
#
# Usage:
#   cd docker
#   cp .env.prod.example ../.env.prod
#   nano ../.env.prod  # Set REQUIRED variables
#   docker compose -f docker-compose.prod.yml --env-file ../.env.prod up -d
#   docker compose -f docker-compose.prod.yml --env-file ../.env.prod logs -f indexer
#   docker compose -f docker-compose.prod.yml --env-file ../.env.prod down
#
# Required environment variables (must be set in .env.prod):
#   POSTGRES_PASSWORD    — Strong password for PostgreSQL
#   HASURA_GRAPHQL_ADMIN_SECRET — Strong secret for Hasura admin access
#   RPC_URL              — LUKSO RPC endpoint
#
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # PostgreSQL Database
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: lsp-indexer-postgres
    restart: unless-stopped

    # Health check to ensure DB is ready before starting indexer
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

    # Persistent volume for database data
    volumes:
      - postgres-data:/var/lib/postgresql/data

    # PostgreSQL tuning for high-write workload (blockchain indexing)
    command:
      - postgres
      - -c
      - max_wal_size=2GB
      - -c
      - shared_buffers=512MB
      - -c
      - checkpoint_timeout=15min
      - -c
      - work_mem=64MB

    # Database credentials from .env (POSTGRES_PASSWORD required — no default)
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}

    # No ports exposed in production — access via internal Docker network only

    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ----------------------------------------------------------------------------
  # Indexer — LUKSO Blockchain Indexer
  # ----------------------------------------------------------------------------
  indexer:
    image: ghcr.io/chillwhales/lsp-indexer:${INDEXER_VERSION:-latest}
    container_name: lsp-indexer
    restart: unless-stopped

    # Wait for PostgreSQL to be healthy before starting
    # Note: Hasura/data-connector start in parallel but indexer doesn't wait
    # (entrypoint script waits for Hasura to be ready before configuring)
    depends_on:
      postgres:
        condition: service_healthy

    # Health check - verify indexer process is running
    healthcheck:
      test: ['CMD', 'pgrep', '-f', 'ts-node.*lib/app/index.js']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Mount logs directory for persistent storage
    volumes:
      - indexer-logs:/app/packages/indexer/logs

    # All environment variables from .env
    environment:
      # Database connection (POSTGRES_PASSWORD required — no default)
      DB_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-postgres}

      # Blockchain data sources (RPC_URL required — no default)
      SQD_GATEWAY: ${SQD_GATEWAY:-https://v2.archive.subsquid.io/network/lukso-mainnet}
      RPC_URL: ${RPC_URL:?Set RPC_URL in .env}
      RPC_RATE_LIMIT: ${RPC_RATE_LIMIT:-10}
      FINALITY_CONFIRMATION: ${FINALITY_CONFIRMATION:-75}

      # IPFS & Metadata
      IPFS_GATEWAY: ${IPFS_GATEWAY:-https://api.universalprofile.cloud/ipfs/}
      FETCH_LIMIT: ${FETCH_LIMIT:-10000}
      FETCH_BATCH_SIZE: ${FETCH_BATCH_SIZE:-1000}
      FETCH_RETRY_COUNT: ${FETCH_RETRY_COUNT:-5}
      METADATA_WORKER_POOL_SIZE: ${METADATA_WORKER_POOL_SIZE:-4}

      # Logging
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /app/packages/indexer/logs
      INDEXER_ENABLE_FILE_LOGGER: ${INDEXER_ENABLE_FILE_LOGGER:-true}

      # Hasura configuration (for entrypoint script)
      HASURA_GRAPHQL_ENDPOINT: ${HASURA_GRAPHQL_ENDPOINT:-http://hasura:8080}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:?HASURA_GRAPHQL_ADMIN_SECRET must be set in .env}

    # Logging configuration for Docker
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '10'
        compress: 'true'

    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  # ----------------------------------------------------------------------------
  # Hasura GraphQL Engine
  # Automatically configured on startup with all tables and relationships
  # ----------------------------------------------------------------------------
  hasura:
    image: hasura/graphql-engine:v2.46.0
    container_name: lsp-indexer-hasura
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      data-connector-agent:
        condition: service_healthy

    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/healthz']
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 5s

    ports:
      - '${HASURA_GRAPHQL_PORT:-8080}:8080'

    environment:
      PG_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-postgres}
      HASURA_GRAPHQL_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-postgres}
      HASURA_GRAPHQL_METADATA_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-postgres}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:?HASURA_GRAPHQL_ADMIN_SECRET must be set in .env}
      HASURA_GRAPHQL_ENABLE_CONSOLE: ${HASURA_GRAPHQL_ENABLE_CONSOLE:-false}
      HASURA_GRAPHQL_DEV_MODE: ${HASURA_GRAPHQL_DEV_MODE:-false}
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: ${HASURA_GRAPHQL_ENABLED_LOG_TYPES:-startup,http-log,webhook-log,websocket-log,query-log}
      HASURA_GRAPHQL_METADATA_DEFAULTS: '{"backend_configs":{"dataconnector":{"athena":{"uri":"http://data-connector-agent:8081/api/v1/athena"},"mariadb":{"uri":"http://data-connector-agent:8081/api/v1/mariadb"},"mysql8":{"uri":"http://data-connector-agent:8081/api/v1/mysql"},"oracle":{"uri":"http://data-connector-agent:8081/api/v1/oracle"},"snowflake":{"uri":"http://data-connector-agent:8081/api/v1/snowflake"}}}}'
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: ${HASURA_GRAPHQL_UNAUTHORIZED_ROLE:-public}

    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ----------------------------------------------------------------------------
  # Hasura Data Connector Agent
  # Required dependency for Hasura GraphQL Engine
  # ----------------------------------------------------------------------------
  data-connector-agent:
    image: hasura/graphql-data-connector:v2.46.0
    container_name: lsp-indexer-data-connector
    restart: unless-stopped

    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8081/api/v1/athena/health']
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 5s

    environment:
      QUARKUS_LOG_LEVEL: ERROR
      QUARKUS_OPENTELEMETRY_ENABLED: 'false'

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

# ==============================================================================
# Persistent Volumes
# ==============================================================================
volumes:
  # PostgreSQL data — persists across container restarts
  postgres-data:
    driver: local
    # Optional: use a specific host path instead of Docker volume
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: ${POSTGRES_VOLUME_PATH:-./data/postgres}

  # Indexer logs — accessible from host for analysis
  indexer-logs:
    driver: local
    # Optional: use a specific host path for easier access
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: ${LOG_DIR:-./logs}
# ==============================================================================
# Networks (optional)
# ==============================================================================
# Uncomment to create a custom network for service isolation
# networks:
#   lsp-indexer-net:
#     driver: bridge
